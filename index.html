<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightmare</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #000000, #1a0000);
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

nav h2 {
  color: red;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* HERO */
.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero h1 {
  font-size: 60px;
  background: linear-gradient(90deg, red, darkred);
  -webkit-background-clip: text;
  color: transparent;
}

.hero p {
  opacity: 0.7;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: red;
  border-radius: 8px;
  border: none;
  color: white;
  cursor: pointer;
}

/* FEATURES */
.features {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  padding: 50px;
}

.card {
  background: rgba(255, 0, 0, 0.05);
  border: 1px solid rgba(255,0,0,0.3);
  margin: 15px;
  padding: 20px;
  width: 250px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 20px red;
}

/* SECTION */
.section {
  text-align: center;
  padding: 60px 20px;
}
</style>

</head>

<body>

<nav>
  <h2>👿 Nightmare</h2>
  <div>
    <a href="#">Home</a>
    <a href="#features">Features</a>
    <a href="#join">Join</a>
  </div>
</nav>

<div class="hero">
  <h1>Nightmare Family</h1>
  <p>The most powerful RP gang</p>
  <button class="btn" onclick="window.location.href='https://discord.gg/YOUR-LINK'">
    Join Now
  </button>
</div>

<div class="section" id="features">
  <h2>Why Join Us</h2>

  <div class="features">
    <div class="card">
      <h3>🔥 Power</h3>
      <p>Top dominance in RP world</p>
    </div>

    <div class="card">
      <h3>👥 Team</h3>
      <p>Loyal and strong members</p>
    </div>

    <div class="card">
      <h3>💀 Reputation</h3>
      <p>Feared across servers</p>
    </div>
  </div>
</div>

<div class="section" id="join">
  <h2>Join Nightmare</h2>
  <p>Become part of the elite</p>
  <button class="btn" onclick="window.location.href='https://discord.gg/YOUR-LINK'">
    Apply Now
  </button>
</div>

</body>
</html>
